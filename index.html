<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fef0e7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Budgy</title>
<link rel="manifest" id="manifest-link">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3064/3064029.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');

:root {
  --glass-bg: rgba(255, 255, 255, 0.45);
  --glass-border: rgba(255, 255, 255, 0.6);
  --glass-shadow: 0 12px 40px rgba(0,0,0,0.06), inset 0 2px 2px rgba(255,255,255,0.8);
  --txt: #1c1c1e; --txt2: rgba(60,60,67,0.6); --accent: #007AFF;
  --bg1: #fef0e7; --bg2: #e0f2fe; --r: 24px;
}

body.dark {
  --glass-bg: rgba(30, 30, 35, 0.5);
  --glass-border: rgba(255, 255, 255, 0.15);
  --glass-shadow: 0 12px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
  --txt: #f5f5f7; --txt2: rgba(235,235,245,0.6);
  --bg1: #111418; --bg2: #05070a;
}

*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: radial-gradient(circle at top left, var(--bg1), var(--bg2)); min-height: 100vh; display: flex; justify-content: center; color: var(--txt); transition: background 0.5s ease; overscroll-behavior: none; }
.phone-wrap { width: 100%; max-width: 420px; padding: 20px 20px 140px; position: relative; overflow-x: hidden; min-height: 100vh;}
.glass { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--r); box-shadow: var(--glass-shadow); backdrop-filter: blur(32px) saturate(1.8); -webkit-backdrop-filter: blur(32px) saturate(1.8); }
.top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; margin-top: env(safe-area-inset-top, 0px); }
.icon-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: 0.2s; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 50%; }

.tab-content { display: none; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
.tab-content.active { display: block; }
@keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

.hero { padding: 30px 20px; margin-bottom: 12px; text-align: center; }
.hero-salary-in { font-size: 38px; font-weight: 300; color: var(--txt); background: transparent; border: none; outline: none; width: 100%; text-align: center; letter-spacing: -1px; }

.cat-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
.cat-wrapper { position: relative; border-radius: var(--r); }
.cat-card { padding: 16px; display: flex; align-items: center; gap: 12px; position: relative; overflow: hidden; z-index: 1; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--r); }

@keyframes jiggle { 0% { transform: rotate(-0.8deg); } 50% { transform: rotate(0.8deg); } 100% { transform: rotate(-0.8deg); } }
.edit-mode .cat-card { animation: jiggle 0.3s infinite ease-in-out; pointer-events: none; }
.delete-badge { position: absolute; top: -4px; left: -4px; width: 26px; height: 26px; background: #FF3B30; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; opacity: 0; transform: scale(0); transition: all 0.25s; z-index: 10; pointer-events: none; cursor:pointer;}
.edit-mode .delete-badge { opacity: 1; transform: scale(1); pointer-events: auto; }

.notif-dot { position: absolute; top: 10px; right: 10px; width: 10px; height: 10px; background: #FF3B30; border-radius: 50%; display: none; box-shadow: 0 0 8px rgba(255,59,48,0.8); }
.cat-progress-bg { position: absolute; top: 0; left: 0; height: 100%; background: rgba(0, 122, 255, 0.08); z-index: -1; transition: width 0.8s; }
.cat-dot { width: 40px; height: 40px; border-radius: 12px; background: rgba(120,120,128,0.15); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.cat-body { flex: 1; min-width: 0; }
.cat-name-in { font-size: 15px; font-weight: 600; color: var(--txt); background: transparent; border: none; outline: none; width: 100%; margin-bottom: 4px; font-family: inherit;}

.date-container { position: relative; display: inline-block; vertical-align: middle; }
.date-tag { appearance: none; background: rgba(255, 149, 0, 0.1); border: 1px solid rgba(255, 149, 0, 0.2); border-radius: 100px; padding: 2px 10px; font-size: 11px; font-weight: 600; color: #FF9500; pointer-events: none; }
.due-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5; }

.bank-tag { appearance: none; background: rgba(120, 120, 128, 0.1); border: 1px solid rgba(120, 120, 128, 0.2); border-radius: 100px; padding: 2px 8px; font-size: 11px; font-weight: 600; color: var(--txt2); font-family: inherit; outline: none; }
.amount-in { font-size: 15px; font-weight: 600; color: var(--txt); background: transparent; border: none; outline: none; text-align: right; width: 90px; }
.actual-in { font-size: 14px; font-weight: 600; color: var(--accent); background: transparent; border: none; outline: none; text-align: right; width: 90px; }

.alert-banner { background: rgba(255, 59, 48, 0.15); border: 1px solid rgba(255, 59, 48, 0.3); border-radius: var(--r); padding: 15px; margin-bottom: 15px; display: none; align-items: center; gap: 12px; color: #FF3B30; backdrop-filter: blur(20px); }
.ring-container { position: relative; display: flex; justify-content: center; align-items: center; margin: 20px 0; padding: 20px; }
.ring-pct { font-size: 32px; font-weight: 600; letter-spacing: -1px;}
.insight-card { padding: 20px; display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
.money-text { font-weight: 600; font-size: 15px; }
.bill-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(120,120,128,0.05); border-radius: 14px; margin-bottom: 8px;}

.bottom-nav-container { position: fixed; bottom: max(30px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 380px; z-index: 100; }
.bottom-glass-bar { display: flex; justify-content: space-between; align-items: center; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 99px; padding: 8px 15px; height: 75px; }
.tab-btn { flex: none; width: 100px; text-align: center; padding: 12px 0; border: none; background: transparent; color: var(--txt2); font-size: 14px; font-weight: 600; border-radius: 100px; cursor: pointer; }
.tab-btn.active { color: var(--txt); background: rgba(120,120,128,0.1); }
.integrated-add-btn { flex: none; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--accent); margin: 0 -20px; z-index: 101; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

#pin-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--glass-bg); backdrop-filter: blur(40px) saturate(2); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.pin-input { font-size: 32px; letter-spacing: 12px; text-align: center; width: 180px; background: transparent; border: none; border-bottom: 2px solid var(--txt); outline: none; color: var(--txt); font-weight: 600; }
</style>
</head>
<body>

<div id="pin-overlay" style="display: none;">
  <div style="font-size: 48px; margin-bottom: 10px;">🔒</div>
  <h2 style="color: var(--txt);">Budgy Terkunci</h2>
  <input type="password" id="pin-entry" class="pin-input" inputmode="numeric" maxlength="4" placeholder="••••" />
  <button id="btn-reset-app" style="margin-top: 40px; background:none; border:none; color:#FF3B30; text-decoration:underline; font-size:12px; cursor:pointer;">Reset Aplikasi</button>
</div>

<div class="phone-wrap">
  <div class="top-nav">
    <div class="icon-btn" id="pin-toggle">🔓</div>
    <div style="display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: 19px;"><span>🦜</span> Budgy</div>
    <div class="icon-btn" id="theme-toggle">🌓</div>
  </div>
  
  <div id="tab-alokasi" class="tab-content active">
    <div class="glass hero">
      <div style="font-size: 12px; font-weight: 600; color: var(--txt2); text-transform: uppercase; margin-bottom: 12px;">Gaji Bulanan</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;">
        <span style="font-size:24px; opacity:0.5;">Rp</span>
        <input class="hero-salary-in blurrable" id="salary-in" type="text" inputmode="numeric" />
        <div class="icon-btn" id="privacy-toggle" style="width: 34px; height: 34px; font-size: 15px;">👁️</div>
      </div>
    </div>
    
    <div style="display:flex; justify-content:space-between; align-items:center; margin: 20px 0 12px; padding: 0 8px;">
      <div style="font-size: 12px; font-weight: 600; color: var(--txt2); text-transform: uppercase;">Alokasi Kategori</div>
      <div id="edit-mode-btn" style="cursor:pointer; color: var(--txt2); font-weight:bold; font-size: 22px;">⋯</div>
    </div>
    <div id="cat-list" class="cat-list"></div>
  </div>

  <div id="tab-ringkasan" class="tab-content">
    <div id="alert-banner" class="alert-banner"><div style="font-size: 24px;">⚠️</div><div><div style="font-size: 14px; font-weight: 600;">Tagihan Mendekat!</div><div id="alert-msg" style="font-size: 12px; opacity: 0.8;"></div></div></div>
    
    <div class="glass ring-container">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(120,120,128,0.15)" stroke-width="16"/>
        <circle id="ring-track" cx="100" cy="100" r="80" fill="none" stroke="url(#ringGrad)" stroke-width="16" stroke-linecap="round" stroke-dasharray="502" stroke-dashoffset="502" transform="rotate(-90 100 100)"/>
        <defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#007AFF"/><stop offset="100%" stop-color="#34C759"/></linearGradient></defs>
      </svg>
      <div class="ring-center"><div class="ring-pct" id="ring-pct">0%</div><div style="font-size:12px; color:var(--txt2);">Terpakai</div></div>
    </div>

    <div style="margin: 24px 0 10px; font-size: 13px; font-weight: 600; color: var(--txt2); text-transform: uppercase; padding-left: 8px;">Jadwal Tagihan</div>
    <div class="glass insight-card" id="bill-schedule-list" style="margin-top: 0; padding: 12px;"></div>

    <div class="glass insight-card">
      <div style="display:flex; justify-content:space-between; font-size:14px;"><span>Total Rencana</span><strong id="total-plan-val" class="money-text blurrable"></strong></div>
      <div style="display:flex; justify-content:space-between; font-size:14px; margin-top:10px;"><span>Total Aktual</span><strong id="total-actual-val" class="money-text blurrable" style="color:var(--accent);"></strong></div>
      <div style="margin-top: 15px; border-top:1px solid var(--glass-border); padding-top:15px;">
        <div style="display:flex; justify-content:space-between; font-size:14px;"><span>Sisa Anggaran</span><strong id="selisih-val" class="money-text blurrable"></strong></div>
        <div style="width:100%; height:8px; background:rgba(120,120,128,0.1); border-radius:10px; margin-top:8px; overflow:hidden;"><div id="diff-bar" style="height:100%; width:0%; transition:0.5s;"></div></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:14px; margin-top:15px;"><span>Sisa Gaji Bebas</span><strong id="sisa-val" class="money-text blurrable"></strong></div>
    </div>
  </div>
</div>

<div class="bottom-nav-container">
  <div class="bottom-glass-bar">
    <button class="tab-btn active" data-tab="tab-alokasi">Alokasi</button>
    <div class="integrated-add-btn" id="integrated-add-btn">➕</div>
    <button class="tab-btn" data-tab="tab-ringkasan">Ringkasan</button>
  </div>
</div>

<script type="module">
// 1. IMPORT FIREBASE (MODULAR SDK)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
// Jika nanti butuh database (Firestore), import getFirestore di sini.

const firebaseConfig = {
  apiKey: "AIzaSyCudBjzhXcqSWVF4kzakcPomeVj_GcHtys",
  authDomain: "budgy-7e6e1.firebaseapp.com",
  projectId: "budgy-7e6e1",
  storageBucket: "budgy-7e6e1.firebasestorage.app",
  messagingSenderId: "733464255051",
  appId: "1:733464255051:web:d30d49716990d3a8a7cbce",
  measurementId: "G-PNHCVDRW0L"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
console.log("Firebase Terhubung!");

// 2. PWA SETUP (Sesuai Standar Baru)
const manifestData = {
  "name": "Budgy Pro",
  "short_name": "Budgy",
  "start_url": "./",
  "display": "standalone",
  "background_color": "#fef0e7",
  "theme_color": "#fef0e7",
  "icons": [
    { "src": "https://cdn-icons-png.flaticon.com/512/3064/3064029.png", "sizes": "192x192", "type": "image/png" },
    { "src": "https://cdn-icons-png.flaticon.com/512/3064/3064029.png", "sizes": "512x512", "type": "image/png" }
  ]
};
const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swCode = `
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
    `;
    const swBlob = new Blob([swCode], {type: 'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW Gagal', err));
  });
}

// 3. LOGIKA APLIKASI UTAMA
const BANKS = ['BCA', 'Mandiri', 'BNI', 'BRI', 'Jago', 'SeaBank', 'GoPay', 'OVO', 'DANA', 'Tunai'];
const EMOJI_MAP = { 'makan': '🍔', 'kopi': '☕', 'listrik': '⚡', 'air': '💧', 'bensin': '⛽', 'belanja': '🛍️', 'tabung': '💰', 'cicilan': '💳' };

let cats = JSON.parse(localStorage.getItem('cats')) || [{id: Date.now(), name: 'Makan', amount: 1500000, actual: 0, icon: '🍔', bank: 'BCA', due: ''}];
let salary = localStorage.getItem('salary') || 5000000;
let isPrivate = false;
let userPin = localStorage.getItem('userPin') || '';
let isEditMode = false;

const haptic = () => { if(navigator.vibrate) navigator.vibrate(10); };
const save = () => { 
  localStorage.setItem('cats', JSON.stringify(cats)); 
  localStorage.setItem('salary', salary); 
  // Nanti fungsi simpan ke Firestore bisa ditaruh di sini
};
const fmt = (n) => n === 0 ? '0' : Math.round(n).toLocaleString('id-ID');

// Expose fungsi ke window agar bisa dipanggil HTML inline
window.hapusKategori = function(id) { 
  cats = cats.filter(c => c.id !== id); 
  save(); buildList(); 
};

window.clearPin = function() {
  if(confirm('Peringatan: Mereset akan MENGHAPUS SEMUA DATA. Lanjutkan?')) { 
    localStorage.clear(); location.reload(); 
  }
};

document.getElementById('btn-reset-app').addEventListener('click', window.clearPin);

function formatDate(dateStr) {
  if(!dateStr) return '📅 Atur Tgl';
  const d = new Date(dateStr);
  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

function buildList() {
  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  cats.forEach((c, index) => {
    const wrap = document.createElement('div');
    wrap.className = 'cat-wrapper';
    wrap.innerHTML = `
      <div class="delete-badge" onclick="window.hapusKategori(${c.id})">−</div>
      <div class="cat-card">
        <div class="notif-dot" id="dot-${c.id}"></div>
        <div class="cat-progress-bg" id="prog-${c.id}"></div>
        <div class="cat-dot">${c.icon}</div>
        <div class="cat-body">
          <input class="cat-name-in" type="text" value="${c.name}" placeholder="Kategori">
          <div style="display:flex; gap:6px;">
            <select class="bank-tag" data-idx="${index}">
              ${BANKS.map(b => `<option value="${b}" ${c.bank === b ? 'selected' : ''}>${b}</option>`).join('')}
            </select>
            <div class="date-container">
              <div class="date-tag" id="due-lbl-${c.id}">${formatDate(c.due)}</div>
              <input type="date" value="${c.due}" data-idx="${index}" class="due-input">
            </div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="amt-row"><input class="amount-in blurrable" type="text" inputmode="numeric" value="${fmt(c.amount)}" data-idx="${index}"></div>
          <div class="amt-row" style="margin-top:5px;"><input class="actual-in blurrable" type="text" inputmode="numeric" value="${fmt(c.actual)}" data-idx="${index}"></div>
        </div>
      </div>
    `;
    list.appendChild(wrap);

    wrap.querySelector('.due-input').onchange = (e) => {
      cats[index].due = e.target.value;
      save(); updateSummary(); buildList(); // Re-render untuk update UI
    };
    wrap.querySelector('.cat-name-in').oninput = (e) => {
      cats[index].name = e.target.value;
      const word = e.target.value.toLowerCase().split(' ').pop();
      if(EMOJI_MAP[word]) { cats[index].icon = EMOJI_MAP[word]; wrap.querySelector('.cat-dot').textContent = EMOJI_MAP[word]; }
      save();
    };
    wrap.querySelector('.bank-tag').onchange = (e) => { cats[index].bank = e.target.value; save(); updateSummary(); };
    wrap.querySelector('.amount-in').oninput = (e) => handleVal(e, index, 'amount');
    wrap.querySelector('.actual-in').oninput = (e) => handleVal(e, index, 'actual');
  });
  updateSummary();
}

function handleVal(e, idx, key) {
  let val = parseInt(e.target.value.replace(/\D/g, '')) || 0;
  cats[idx][key] = val;
  e.target.value = fmt(val);
  save(); updateSummary();
}

function updateSummary() {
  const sal = parseInt(salary) || 0;
  let tPlan = 0, tAct = 0, alerts = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  
  // Untuk Daftar Tagihan
  let pendingBills = [];

  cats.forEach(c => {
    tPlan += c.amount; tAct += c.actual;
    const prog = document.getElementById(`prog-${c.id}`);
    if(prog) {
      let p = c.amount > 0 ? (c.actual/c.amount)*100 : 0;
      prog.style.width = Math.min(p, 100) + '%';
      prog.style.backgroundColor = p > 100 ? 'rgba(255,59,48,0.15)' : 'rgba(0,122,255,0.08)';
    }
    
    const dot = document.getElementById(`dot-${c.id}`);
    if(c.due && c.actual < c.amount) {
      const dDate = new Date(c.due);
      const diff = Math.ceil((dDate - today) / 86400000);
      
      // Simpan ke array tagihan
      pendingBills.push({ ...c, diffDays: diff, dateObj: dDate });

      if(diff <= 3) { alerts++; if(dot) dot.style.display = 'block'; }
      else if(dot) dot.style.display = 'none';
    } else if(dot) dot.style.display = 'none';
  });

  // Render Alert
  const banner = document.getElementById('alert-banner');
  if(alerts > 0) { banner.style.display = 'flex'; document.getElementById('alert-msg').textContent = `Ada ${alerts} tagihan yang butuh perhatianmu (<= 3 Hari).`; }
  else banner.style.display = 'none';

  // Render Daftar Tagihan
  const billDiv = document.getElementById('bill-schedule-list');
  billDiv.innerHTML = '';
  if(pendingBills.length === 0) {
    billDiv.innerHTML = '<div style="text-align:center; color:var(--txt2); font-size:13px; padding: 10px;">Yeay! Tidak ada tagihan tertunda. 🎉</div>';
  } else {
    // Sortir berdasarkan tanggal terdekat
    pendingBills.sort((a, b) => a.dateObj - b.dateObj);
    pendingBills.forEach(b => {
      let colorTag = b.diffDays < 0 ? '#FF3B30' : (b.diffDays <= 3 ? '#FF9500' : 'var(--txt)');
      let statusText = b.diffDays < 0 ? 'Terlewat!' : (b.diffDays === 0 ? 'Hari Ini' : `${b.diffDays} hari lagi`);
      
      billDiv.innerHTML += `
        <div class="bill-item">
          <div style="display:flex; align-items:center; gap:10px;">
            <div style="font-size:20px;">${b.icon}</div>
            <div>
              <div style="font-size:14px; font-weight:600;">${b.name}</div>
              <div style="font-size:11px; color:${colorTag};">${formatDate(b.due)} • ${statusText}</div>
            </div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:14px; font-weight:600;" class="blurrable">Rp ${fmt(b.amount - b.actual)}</div>
            <div style="font-size:10px; color:var(--txt2);">Sisa Bayar</div>
          </div>
        </div>
      `;
    });
  }

  // Update Lingkaran & Angka Utama
  const pct = sal > 0 ? Math.round((tPlan/sal)*100) : 0;
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('ring-track').style.strokeDashoffset = 502 * (1 - pct/100);
  document.getElementById('total-plan-val').textContent = 'Rp ' + fmt(tPlan);
  document.getElementById('total-actual-val').textContent = 'Rp ' + fmt(tAct);
  document.getElementById('selisih-val').textContent = 'Rp ' + fmt(tPlan - tAct);
  document.getElementById('diff-bar').style.width = tPlan > 0 ? Math.min((tAct/tPlan)*100, 100)+'%' : '0%';
  document.getElementById('diff-bar').style.backgroundColor = tAct > tPlan ? '#FF3B30' : '#007AFF';
  document.getElementById('sisa-val').textContent = 'Rp ' + fmt(sal - tPlan);
}

document.getElementById('salary-in').oninput = (e) => { salary = parseInt(e.target.value.replace(/\D/g, '')) || 0; e.target.value = fmt(salary); save(); updateSummary(); };
document.getElementById('salary-in').value = fmt(salary);

document.getElementById('edit-mode-btn').onclick = () => {
  haptic(); isEditMode = !isEditMode;
  document.getElementById('cat-list').classList.toggle('edit-mode');
  document.getElementById('edit-mode-btn').textContent = isEditMode ? 'Selesai' : '⋯';
};

document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => {
  haptic();
  document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
  b.classList.add('active'); document.getElementById(b.dataset.tab).classList.add('active');
  document.getElementById('integrated-add-btn').style.opacity = b.dataset.tab === 'tab-ringkasan' ? '0.3' : '1';
});

document.getElementById('integrated-add-btn').onclick = () => {
  haptic(); if(isEditMode) document.getElementById('edit-mode-btn').click();
  cats.push({id: Date.now(), name: '', amount: 0, actual: 0, icon: '📦', bank: 'BCA', due:''});
  save(); buildList(); setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 100);
};

document.getElementById('theme-toggle').onclick = () => { haptic(); document.body.classList.toggle('dark'); };
document.getElementById('privacy-toggle').onclick = () => { haptic(); isPrivate = !isPrivate; document.body.classList.toggle('privacy-on'); };

if (userPin) document.getElementById('pin-overlay').style.display = 'flex';
document.getElementById('pin-entry').oninput = (e) => {
  if (e.target.value === userPin) { document.getElementById('pin-overlay').style.opacity = '0'; setTimeout(()=>{document.getElementById('pin-overlay').style.display = 'none';}, 400); haptic(); }
};
document.getElementById('pin-toggle').onclick = () => {
  haptic();
  if(userPin) { if(confirm('Hapus PIN?')) { userPin = ''; localStorage.setItem('userPin', ''); location.reload(); } }
  else { let p = prompt('Buat PIN (4 angka):'); if(p && p.length === 4) { userPin = p; localStorage.setItem('userPin', p); location.reload(); } }
};

buildList();
</script>
</body>
</html>
