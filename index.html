<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fef0e7">
<title>Budgy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');

:root {
  --glass-bg: rgba(255, 255, 255, 0.45);
  --glass-border: rgba(255, 255, 255, 0.6);
  --glass-shadow: 0 12px 40px rgba(0,0,0,0.06), inset 0 2px 2px rgba(255,255,255,0.8);
  --footer-bg: rgba(200, 205, 215, 0.65); 
  --txt: #1c1c1e; --txt2: rgba(60,60,67,0.6); --accent: #007AFF;
  --grn: #34C759; --red: #FF3B30; --org: #FF9500;
  --bg1: #fef0e7; --bg2: #e0f2fe; --r: 24px;
}

body.dark {
  --glass-bg: rgba(30, 30, 35, 0.5);
  --glass-border: rgba(255, 255, 255, 0.15);
  --glass-shadow: 0 12px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
  --footer-bg: rgba(15, 15, 20, 0.85);
  --txt: #f5f5f7; --txt2: rgba(235,235,245,0.6);
  --bg1: #111418; --bg2: #05070a;
}

*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: radial-gradient(circle at top left, var(--bg1), var(--bg2)); min-height: 100vh; display: flex; justify-content: center; color: var(--txt); transition: background 0.5s ease; overscroll-behavior: none; }
.phone-wrap { width: 100%; max-width: 420px; padding: 20px 20px 140px; position: relative; overflow-x: hidden; min-height: 100vh;}
.glass { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--r); box-shadow: var(--glass-shadow); backdrop-filter: blur(32px) saturate(1.8); -webkit-backdrop-filter: blur(32px) saturate(1.8); }

/* UI Elements */
.top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; margin-top: env(safe-area-inset-top, 0px); }
.wm { font-size: 19px; font-weight: 600; display: flex; align-items: center; gap: 7px; }

.tab-content { display: none; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
.tab-content.active { display: block; }
@keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

/* Hero / Gaji */
.hero { padding: 30px 20px; margin-bottom: 12px; text-align: center; }
.hero-salary-in { font-size: 38px; font-weight: 300; color: var(--txt); background: transparent; border: none; outline: none; width: 100%; text-align: center; letter-spacing: -1px; }

/* Categories & Drag Handle */
.cat-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
.cat-wrapper { position: relative; border-radius: var(--r); }
.cat-card { padding: 16px; display: flex; align-items: center; gap: 12px; position: relative; overflow: hidden; z-index: 1; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--r); }

@keyframes jiggle { 0% { transform: rotate(-0.8deg); } 50% { transform: rotate(0.8deg); } 100% { transform: rotate(-0.8deg); } }
.edit-mode .cat-card { animation: jiggle 0.3s infinite ease-in-out; }
.delete-badge { position: absolute; top: -4px; left: -4px; width: 26px; height: 26px; background: #FF3B30; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; opacity: 0; transform: scale(0); transition: all 0.25s; z-index: 10; cursor:pointer; pointer-events: none; }
.edit-mode .delete-badge { opacity: 1; transform: scale(1); pointer-events: auto; }

.drag-handle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 24px; color: var(--txt2); padding: 15px; display: none; cursor: grab; z-index: 20; }
.edit-mode .drag-handle { display: block; }
.edit-mode .amt-row, .edit-mode .date-container, .edit-mode .bank-tag { opacity: 0.2; pointer-events: none; transition: 0.3s; }
.edit-mode .cat-name-in { pointer-events: none; }
.cat-wrapper.dragging { z-index: 999; }
.cat-wrapper.dragging .cat-card { animation: none !important; transform: scale(1.03); box-shadow: 0 15px 30px rgba(0,0,0,0.15); border: 1px solid var(--accent); }

.cat-progress-bg { position: absolute; top: 0; left: 0; height: 100%; background: rgba(0, 122, 255, 0.08); z-index: -1; transition: width 0.8s; }
.cat-dot { width: 40px; height: 40px; border-radius: 12px; background: rgba(120,120,128,0.15); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.cat-body { flex: 1; min-width: 0; }
.cat-name-in { font-size: 15px; font-weight: 600; color: var(--txt); background: transparent; border: none; outline: none; width: 100%; margin-bottom: 4px; font-family: inherit;}

/* Badges */
.date-container { position: relative; display: inline-block; vertical-align: middle; }
.date-tag { appearance: none; background: rgba(255, 149, 0, 0.1); border: 1px solid rgba(255, 149, 0, 0.2); border-radius: 100px; padding: 2px 10px; font-size: 11px; font-weight: 600; color: #FF9500; pointer-events: none; display: flex; align-items: center; gap: 4px; }
.due-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5; }

.bank-tag { appearance: none; background: rgba(120, 120, 128, 0.1); border: 1px solid rgba(120, 120, 128, 0.2); border-radius: 100px; padding: 2px 8px; font-size: 11px; font-weight: 600; color: var(--txt2); font-family: inherit; outline: none; }
.amount-in { font-size: 15px; font-weight: 600; color: var(--txt); background: transparent; border: none; outline: none; text-align: right; width: 90px; }
.actual-in { font-size: 14px; font-weight: 600; color: var(--accent); background: transparent; border: none; outline: none; text-align: right; width: 90px; }

/* Ringkasan Elements */
.ring-container { position: relative; display: flex; justify-content: center; align-items: center; margin: 20px 0; padding: 20px; }
.ring-pct { font-size: 32px; font-weight: 600; letter-spacing: -1px;}
.insight-card { padding: 20px; display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
.bill-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(120,120,128,0.05); border-radius: 14px; margin-bottom: 10px; transition: 0.2s;}
.cal-btn { width: 34px; height: 34px; border-radius: 8px; background: rgba(255, 149, 0, 0.15); color: #FF9500; border: 1px solid rgba(255, 149, 0, 0.3); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.cal-btn:active { transform: scale(0.9); }

/* --- PROFILE & LOGIN CARD (DI DALAM TAB RINGKASAN) --- */
.profile-card { align-items: center; text-align: center; margin-top: 30px; }
.up-avatar { width: 72px; height: 72px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 36px; background: rgba(120,120,128,0.1); border: 3px solid var(--glass-border); margin: 0 auto 12px; }
.up-avatar img { width: 100%; height: 100%; object-fit: cover; }
.up-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.up-email { font-size: 13px; color: var(--txt2); margin-bottom: 20px; }
.btn-red { width: 100%; padding: 14px; border-radius: 100px; font-size: 15px; font-weight: 600; cursor: pointer; background: rgba(255,59,48,0.08); color: var(--red); border: 1px solid rgba(255,59,48,0.2); transition: 0.2s; }
.btn-red:active { transform: scale(0.97); }
.btn-blue { width: 100%; padding: 14px; border-radius: 100px; font-size: 15px; font-weight: 600; cursor: pointer; background: var(--accent); color: white; border: none; box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3); transition: 0.2s; }
.btn-blue:active { transform: scale(0.97); }
.btn-menu { width: 100%; padding: 16px 20px; border-radius: var(--r); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--txt); margin-top: 10px; transition: 0.2s; }
.btn-menu:active { transform: scale(0.97); }

/* --- NAVIGATION BAR SIMETRIS --- */
.bottom-nav-container { position: fixed; bottom: max(30px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 380px; z-index: 100; }
.bottom-glass-bar { 
  display: flex; justify-content: space-between; align-items: center; position: relative; 
  background: var(--footer-bg); border: 1px solid var(--glass-border); 
  border-radius: 99px; padding: 8px 15px; height: 75px; 
  backdrop-filter: blur(40px) saturate(2); -webkit-backdrop-filter: blur(40px) saturate(2); 
  box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
}
.tab-btn { width: 35%; text-align: center; padding: 14px 0; border: none; background: transparent; color: var(--txt2); font-size: 14px; font-weight: 600; border-radius: 100px; cursor: pointer; transition: 0.3s; }
.tab-btn.active { color: var(--txt); background: rgba(120,120,128,0.15); }
.integrated-add-btn { 
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--accent); z-index: 101; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); 
}
.integrated-add-btn:active { transform: translateX(-50%) scale(0.9); }
</style>
</head>
<body>

<div class="phone-wrap">
  <div class="top-nav">
    <div class="wm"><span>🦜</span> Budgy</div>
  </div>

  <div id="tab-alokasi" class="tab-content active">
    <div class="glass hero">
      <div style="font-size: 12px; font-weight: 600; color: var(--txt2); text-transform: uppercase; margin-bottom: 12px;">Gaji Bulanan</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;">
        <span style="font-size:24px; opacity:0.5;">Rp</span>
        <input class="hero-salary-in" id="salary-in" type="text" inputmode="numeric" />
      </div>
    </div>
    
    <div style="display:flex; justify-content:space-between; align-items:center; margin: 20px 0 12px; padding: 0 8px;">
      <div style="font-size: 12px; font-weight: 600; color: var(--txt2); text-transform: uppercase;">Daftar Kategori</div>
      <div id="edit-mode-btn" style="cursor:pointer; color: var(--txt2); font-weight:bold; font-size: 22px;">⋯</div>
    </div>
    <div id="cat-list" class="cat-list"></div>
  </div>

  <div id="tab-ringkasan" class="tab-content">
    
    <div class="glass ring-container">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(120,120,128,0.15)" stroke-width="16"/>
        <circle id="ring-track" cx="100" cy="100" r="80" fill="none" stroke="url(#ringGrad)" stroke-width="16" stroke-linecap="round" stroke-dasharray="502" stroke-dashoffset="502" transform="rotate(-90 100 100)"/>
        <defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#007AFF"/><stop offset="100%" stop-color="#34C759"/></linearGradient></defs>
      </svg>
      <div class="ring-center" style="position: absolute; text-align: center;"><div class="ring-pct" id="ring-pct">0%</div><div style="font-size:12px; color:var(--txt2);">Terpakai</div></div>
    </div>

    <div class="glass insight-card">
      <div style="display:flex; justify-content:space-between; font-size:14px;"><span>Total Rencana</span><strong id="total-plan-val"></strong></div>
      <div style="display:flex; justify-content:space-between; font-size:14px; margin-top:10px;"><span>Total Aktual</span><strong id="total-actual-val" style="color:var(--accent);"></strong></div>
      <div style="margin-top: 15px; border-top:1px solid var(--glass-border); padding-top:15px;">
        <div style="display:flex; justify-content:space-between; font-size:14px;"><span>Sisa Anggaran</span><strong id="selisih-val"></strong></div>
        <div style="width:100%; height:8px; background:rgba(120,120,128,0.1); border-radius:10px; margin-top:8px; overflow:hidden;"><div id="diff-bar" style="height:100%; width:0%; transition:0.5s;"></div></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:14px; margin-top:15px;"><span>Sisa Gaji Bebas</span><strong id="sisa-val" style="color:var(--grn);"></strong></div>
    </div>

    <div class="glass insight-card">
      <div style="font-size: 11px; font-weight: 600; color: var(--txt2); text-transform: uppercase; margin-bottom: 10px;">Alokasi per Kategori</div>
      <div id="stacked-bar" style="display:flex; height:12px; border-radius:10px; overflow:hidden; gap:2px; margin-bottom:15px; background:rgba(120,120,128,.1);"></div>
      <div id="chart-legend" style="display:flex; flex-direction:column; gap:8px;"></div>
    </div>

    <div style="margin: 24px 0 10px; font-size: 13px; font-weight: 600; color: var(--txt2); text-transform: uppercase; padding-left: 8px;">Jadwal Tagihan</div>
    <div id="bill-schedule-list" style="margin-bottom: 15px;"></div>

    <div class="glass insight-card profile-card">
      <div id="user-logged-out" style="display:flex; flex-direction:column; width:100%;">
        <div style="font-size:48px; margin-bottom:10px;">☁️</div>
        <h3 style="margin-bottom:6px;">Simpan ke Cloud</h3>
        <p style="font-size:13px; color:var(--txt2); margin-bottom:20px;">Login dengan Google agar data aman & tersinkronisasi antar perangkat.</p>
        <button class="btn-blue" id="btn-login">Masuk dengan Google</button>
      </div>

      <div id="user-logged-in" style="display:none; flex-direction:column; width:100%;">
        <div class="up-avatar" id="up-avatar">👤</div>
        <div class="up-name" id="up-name">—</div>
        <div class="up-email" id="up-email"></div>
        <button class="btn-red" id="up-logout">Keluar Akun</button>
      </div>
    </div>

    <button class="btn-menu" id="theme-toggle">
      <div style="display:flex; align-items:center; gap:10px;"><span>🌓</span> <span>Tema Tampilan</span></div>
      <span style="color:var(--txt2); font-size:18px;">›</span>
    </button>
    
  </div>
</div>

<div class="bottom-nav-container" id="bottom-nav">
  <div class="bottom-glass-bar">
    <button class="tab-btn active" data-tab="tab-alokasi">Alokasi</button>
    
    <div class="integrated-add-btn" id="integrated-add-btn">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    
    <button class="tab-btn" data-tab="tab-ringkasan">Ringkasan</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCudBjzhXcqSWVF4kzakcPomeVj_GcHtys",
  authDomain: "budgy-7e6e1.firebaseapp.com",
  projectId: "budgy-7e6e1",
  storageBucket: "budgy-7e6e1.firebasestorage.app",
  messagingSenderId: "733464255051",
  appId: "1:733464255051:web:d30d49716990d3a8a7cbce"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const BANKS = ['BCA', 'Mandiri', 'BNI', 'BRI', 'Jago', 'SeaBank', 'GoPay', 'OVO', 'DANA', 'Tunai'];
const EMOJI_MAP = { 'makan': '🍔', 'kopi': '☕', 'listrik': '⚡', 'air': '💧', 'bensin': '⛽', 'belanja': '🛍️', 'tabung': '💰', 'cicilan': '💳', 'skincare': '✨', 'nonton': '🎬', 'game': '🎮' };
const PALETTE = ['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#FF2D55','#5AC8FA'];

let cats = [];
let salary = 0;
let isEditMode = false;
let currentUser = null;
let dragEl = null;
let startY = 0;

const $ = id => document.getElementById(id);
const haptic = () => { if(navigator.vibrate) navigator.vibrate(10); };
const fmt = (n) => n === 0 ? '0' : Math.round(n).toLocaleString('id-ID');

// Firebase Logic
async function saveToFirebase() {
  if (!currentUser) return;
  try { await setDoc(doc(db, "users", currentUser.uid), { cats: cats, salary: salary }); } 
  catch (e) { console.error(e); }
}

async function loadFromFirebase() {
  if (!currentUser) return;
  const docSnap = await getDoc(doc(db, "users", currentUser.uid));
  if (docSnap.exists()) {
    const d = docSnap.data();
    cats = d.cats || [];
    salary = d.salary || 0;
  } else {
    saveToFirebase();
  }
  $('salary-in').value = fmt(salary);
  buildList();
}

const save = () => { 
  localStorage.setItem('cats', JSON.stringify(cats)); 
  localStorage.setItem('salary', salary); 
  saveToFirebase();
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    $('user-logged-out').style.display = 'none';
    $('user-logged-in').style.display = 'flex';
    $('up-avatar').innerHTML = `<img src="${user.photoURL}">`;
    $('up-name').textContent = user.displayName || 'Pengguna';
    $('up-email').textContent = user.email || '';
    await loadFromFirebase();
  } else {
    currentUser = null;
    $('user-logged-out').style.display = 'flex';
    $('user-logged-in').style.display = 'none';
    cats = JSON.parse(localStorage.getItem('cats')) || [];
    salary = +(localStorage.getItem('salary')) || 0;
    $('salary-in').value = fmt(salary);
    buildList();
  }
});

$('btn-login').onclick = () => signInWithPopup(auth, provider);
$('up-logout').onclick = () => { if(confirm('Yakin ingin keluar akun?')) signOut(auth); };

// Google Calendar Integration
window.addToGoogleCalendar = (idx) => {
  haptic();
  const c = cats[idx];
  const dateStr = c.due.replace(/-/g, '');
  const title = encodeURIComponent(`Bayar ${c.name} - Rp ${fmt(c.amount - c.actual)}`);
  const details = encodeURIComponent(`Budgy Reminder: Tagihan ${c.name}\nBank: ${c.bank}`);
  const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateStr}/${dateStr}&details=${details}&sf=true&output=xml`;
  window.open(url, '_blank');
};

window.hapusKategori = function(id) { cats = cats.filter(c => c.id !== id); save(); buildList(); };

function getDisplayDate(dateStr) {
  if(!dateStr) return '📅 Atur Tgl';
  const d = new Date(dateStr);
  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
  return `📅 ${d.getDate()} ${months[d.getMonth()]}`;
}

function buildChart() {
  const total = cats.reduce((a,c)=>a+c.amount,0);
  const bar = $('stacked-bar');
  const leg = $('chart-legend');
  
  bar.innerHTML=''; leg.innerHTML='';

  if(!total || !cats.length){
    bar.innerHTML='<div style="width:100%; background:rgba(120,120,128,.1);"></div>';
    leg.innerHTML='<div style="text-align:center; font-size:12px; color:var(--txt2); padding:10px 0;">Belum ada data</div>';
    return;
  }

  const sortedCats = [...cats].filter(c => c.amount > 0).sort((a,b) => b.amount - a.amount);

  sortedCats.forEach((c,i)=>{
    const pct = c.amount/total;
    const color = PALETTE[i%PALETTE.length];

    const seg = document.createElement('div');
    seg.style.width = `${pct*100}%`;
    seg.style.background = color;
    seg.style.height = '100%';
    bar.appendChild(seg);

    if(i<6){
      const item = document.createElement('div');
      item.style.display = 'flex'; item.style.alignItems = 'center'; item.style.padding = '4px 0';
      item.innerHTML=`
        <div style="background:${color}; width:10px; height:10px; border-radius:50%; flex-shrink:0;"></div>
        <div style="font-size:16px; margin:0 8px;">${c.icon}</div>
        <div style="flex:1; font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.name||'—'}</div>
        <div style="font-size:13px; font-weight:600; color:var(--txt2); margin-right:8px;">Rp ${fmt(c.amount)}</div>
        <div style="font-size:13px; font-weight:700; color:var(--txt); width:35px; text-align:right;">${Math.round(pct*100)}%</div>`;
      leg.appendChild(item);
    }
  });
}

function buildList() {
  const list = $('cat-list');
  list.innerHTML = '';
  cats.forEach((c, index) => {
    const wrap = document.createElement('div');
    wrap.className = 'cat-wrapper';
    wrap.dataset.id = c.id;
    wrap.innerHTML = `
      <div class="delete-badge" onclick="window.hapusKategori(${c.id})">−</div>
      <div class="cat-card">
        <div class="cat-progress-bg" id="prog-${c.id}"></div>
        <div class="cat-dot">${c.icon}</div>
        <div class="cat-body">
          <input class="cat-name-in" type="text" value="${c.name}" placeholder="Kategori">
          <div style="display:flex; gap:6px;">
            <select class="bank-tag" data-idx="${index}">${BANKS.map(b => `<option value="${b}" ${c.bank === b ? 'selected' : ''}>${b}</option>`).join('')}</select>
            <div class="date-container">
              <div class="date-tag">${getDisplayDate(c.due)}</div>
              <input type="date" value="${c.due}" data-idx="${index}" class="due-input">
            </div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="amt-row"><input class="amount-in" type="text" inputmode="numeric" value="${fmt(c.amount)}"></div>
          <div class="amt-row" style="margin-top:5px;"><input class="actual-in" type="text" inputmode="numeric" value="${fmt(c.actual)}"></div>
        </div>
        <div class="drag-handle">≡</div>
      </div>`;
    list.appendChild(wrap);

    wrap.querySelector('.due-input').onchange = (e) => { cats[index].due = e.target.value; save(); updateSummary(); buildList(); };
    wrap.querySelector('.cat-name-in').oninput = (e) => {
      cats[index].name = e.target.value;
      const word = e.target.value.toLowerCase().split(' ').pop();
      if(EMOJI_MAP[word]) { cats[index].icon = EMOJI_MAP[word]; buildList(); }
      save();
    };
    wrap.querySelector('.bank-tag').onchange = (e) => { cats[index].bank = e.target.value; save(); updateSummary(); };
    wrap.querySelector('.amount-in').oninput = (e) => handleVal(e, index, 'amount');
    wrap.querySelector('.actual-in').oninput = (e) => handleVal(e, index, 'actual');

    // Drag & Drop
    const handle = wrap.querySelector('.drag-handle');
    handle.addEventListener('touchstart', (e) => {
      e.preventDefault(); dragEl = wrap; dragEl.classList.add('dragging'); startY = e.touches[0].clientY; haptic();
    }, {passive: false});

    handle.addEventListener('touchmove', (e) => {
      if(!dragEl) return;
      e.preventDefault();
      let y = e.touches[0].clientY;
      dragEl.style.transform = `translateY(${y - startY}px)`;
      let siblings = [...document.querySelectorAll('.cat-wrapper:not(.dragging)')];
      let nextEl = siblings.find(sib => { let rect = sib.getBoundingClientRect(); return y > rect.top && y < rect.bottom; });
      if(nextEl) {
          let rect = nextEl.getBoundingClientRect();
          if(y > rect.top + rect.height / 2) list.insertBefore(dragEl, nextEl.nextSibling);
          else list.insertBefore(dragEl, nextEl);
          startY = y; dragEl.style.transform = `translateY(0)`; haptic();
      }
    }, {passive: false});

    handle.addEventListener('touchend', () => {
      if(!dragEl) return;
      dragEl.classList.remove('dragging'); dragEl.style.transform = ''; dragEl = null;
      let newCats = [];
      document.querySelectorAll('.cat-wrapper').forEach(w => {
          let cat = cats.find(c => c.id === parseInt(w.dataset.id));
          if(cat) newCats.push(cat);
      });
      cats = newCats; save(); buildList();
    });
  });
  updateSummary();
}

function handleVal(e, idx, key) {
  let val = parseInt(e.target.value.replace(/\D/g, '')) || 0;
  cats[idx][key] = val;
  e.target.value = fmt(val);
  save(); updateSummary();
}

function updateSummary() {
  const sal = parseInt(salary) || 0;
  let tPlan = 0, tAct = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  let pending = [];

  cats.forEach((c, idx) => {
    tPlan += c.amount; tAct += c.actual;
    const prog = $(`prog-${c.id}`);
    if(prog) {
      let p = c.amount > 0 ? (c.actual/c.amount)*100 : 0;
      prog.style.width = Math.min(p, 100) + '%';
      prog.style.backgroundColor = p > 100 ? 'rgba(255,59,48,0.15)' : 'rgba(0,122,255,0.08)';
    }
    if(c.due && c.actual < c.amount) pending.push({ ...c, idx, dateObj: new Date(c.due) });
  });

  const billDiv = $('bill-schedule-list');
  billDiv.innerHTML = '';
  if(pending.length) {
    pending.sort((a,b) => a.dateObj - b.dateObj).forEach(b => {
      let dateDisplay = getDisplayDate(b.due);
      billDiv.innerHTML += `
        <div class="bill-item glass">
          <div style="display:flex; align-items:center; gap:10px;">
            <div style="font-size:20px;">${b.icon}</div>
            <div>
              <div style="font-size:14px; font-weight:600;">${b.name}</div>
              <div style="font-size:11px; opacity:0.8; margin-top:2px;">
                <span style="color:#FF9500; font-weight:600;">${dateDisplay}</span> • Rp ${fmt(b.amount - b.actual)}
              </div>
            </div>
          </div>
          <button class="cal-btn" onclick="window.addToGoogleCalendar(${b.idx})" title="Ingatkan di Google Calendar">🗓️</button>
        </div>`;
    });
  } else billDiv.innerHTML = '<div style="text-align:center; font-size:13px; opacity:0.5; padding:10px;">Semua lunas! 🎉</div>';

  const pct = sal > 0 ? Math.round((tPlan/sal)*100) : 0;
  $('ring-pct').textContent = pct + '%';
  $('ring-track').style.strokeDashoffset = 502 * (1 - pct/100);
  $('total-plan-val').textContent = 'Rp ' + fmt(tPlan);
  $('total-actual-val').textContent = 'Rp ' + fmt(tAct);
  
  const diff = tPlan - tAct;
  $('selisih-val').textContent = 'Rp ' + fmt(diff);
  $('selisih-val').style.color = diff < 0 ? 'var(--red)' : 'var(--txt)';
  
  $('diff-bar').style.width = tPlan > 0 ? Math.min((tAct/tPlan)*100, 100)+'%' : '0%';
  $('sisa-val').textContent = 'Rp ' + fmt(sal - tPlan);

  buildChart();
}

$('salary-in').oninput = (e) => { salary = parseInt(e.target.value.replace(/\D/g, '')) || 0; e.target.value = fmt(salary); save(); updateSummary(); };

$('edit-mode-btn').onclick = () => { 
  haptic(); isEditMode = !isEditMode; 
  $('cat-list').classList.toggle('edit-mode'); 
  
  // Mengubah teks dan styling tombol saat mode edit aktif
  if (isEditMode) {
    $('edit-mode-btn').textContent = 'Selesai';
    $('edit-mode-btn').style.fontSize = '14px';
    $('edit-mode-btn').style.color = 'var(--accent)';
  } else {
    $('edit-mode-btn').textContent = '⋯';
    $('edit-mode-btn').style.fontSize = '22px';
    $('edit-mode-btn').style.color = 'var(--txt2)';
  }
};

document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => {
  haptic(); document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
  b.classList.add('active'); $(b.dataset.tab).classList.add('active');
  if(isEditMode) $('edit-mode-btn').click();
  
  // Sembunyikan tombol + jika sedang di tab ringkasan
  if (b.dataset.tab === 'tab-ringkasan') {
    $('integrated-add-btn').style.transform = 'translate(-50%, 50px)';
    $('integrated-add-btn').style.opacity = '0';
  } else {
    $('integrated-add-btn').style.transform = 'translateX(-50%)';
    $('integrated-add-btn').style.opacity = '1';
  }
});

$('integrated-add-btn').onclick = () => { 
  haptic(); if(isEditMode) $('edit-mode-btn').click(); 
  cats.push({id: Date.now(), name: '', amount: 0, actual: 0, icon: '📦', bank: 'BCA', due:''}); 
  save(); buildList(); 
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
};

$('theme-toggle').onclick = () => { haptic(); document.body.classList.toggle('dark'); };
</script>
